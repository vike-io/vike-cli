# Eval questions for vike-cli.
#
# Schema:
#   id              short kebab-case unique slug (for per-question tracking)
#   q               natural-language user request
#   expected_commands  list of acceptable commands (a question can have >1 right answer)
#   expected_flags  list of flag names that should appear (no values, just names)
#   forbidden       list of fragments that ZERO the score if present (common hallucinations)
#   skill           which SKILL.md is supposed to fire — used for per-skill scoring
#   multi_step      true if the answer is more than one command (composite playbook)
#
# Single-step questions exercise individual tools.
# Multi-step questions exercise composite skills (smart-money-discovery,
# polymarket-screener, wallet-portfolio, etc.) — answer should list 2+
# commands separated by " && " or "; ".

questions:

  # ─── Single-step: token domain ───────────────────────────────────────
  - id: token-search
    q: "Find the address of the PEPE token on Ethereum."
    expected_commands: ["vike token search"]
    expected_flags: ["--chain"]
    forbidden: ["--network", "vike search token", "--token"]
    skill: vike-token-search

  - id: token-holders
    q: "Show me the top 10 holders of USDC by net inflow."
    expected_commands: ["vike token holders"]
    expected_flags: ["--limit"]
    forbidden: ["--top"]
    skill: vike-token-holders

  - id: token-screener
    q: "Find tokens on Ethereum with smart money accumulating in the last 7 days."
    expected_commands: ["vike token screener"]
    expected_flags: ["--sort", "--smart-money-only"]
    forbidden: ["--smart", "vike screener"]
    skill: vike-token-screener

  # ─── Single-step: wallet domain ───────────────────────────────────────
  - id: defi-positions
    q: "What's vitalik.eth's portfolio across DeFi protocols?"
    expected_commands: ["vike defi"]
    forbidden: ["--protocols"]
    skill: vike-defi-positions

  - id: hl-top-traders
    q: "Top Hyperliquid traders by PnL in the last 30 days, win rate above 75%."
    expected_commands: ["vike perp top-traders"]
    expected_flags: ["--window", "--sort", "--min-win-rate"]
    forbidden: ["--winrate"]
    skill: vike-hl-top-traders

  - id: perp-funding-arb
    q: "Find cross-venue funding-rate arb opportunities right now."
    expected_commands: ["vike perp funding"]
    forbidden: ["--arb"]
    skill: vike-perp-funding-arb

  - id: wallet-counterparties
    q: "Who are the main trading counterparties of 0xd8da6bf26964af9d7eed9e03e53415d37aa96045?"
    expected_commands: ["vike wallet counterparties"]
    expected_flags: ["--limit"]
    forbidden: ["--depth"]
    skill: vike-wallet-counterparties

  - id: wallet-balances
    q: "Show me current ERC-20 token balances for a wallet across all major chains."
    expected_commands: ["vike wallet balances"]
    expected_flags: ["--chains", "--min-usd"]
    forbidden: ["--all-chains"]
    skill: vike-wallet-balances

  - id: wallet-transactions
    q: "Show me the last 50 outgoing USDC transfers from 0xabc... in the past week."
    expected_commands: ["vike wallet transactions", "vike wallet txs"]
    expected_flags: ["--direction", "--days", "--token"]
    forbidden: ["--from", "--type"]
    skill: vike-wallet-transactions

  - id: wallet-trace
    q: "Trace the money from wallet 0xabc... outward for 3 hops, showing only flows above $50k."
    expected_commands: ["vike wallet trace"]
    expected_flags: ["--depth", "--min-usd"]
    forbidden: ["--levels", "--hops"]
    skill: vike-wallet-trace

  - id: wallet-compare
    q: "Are wallets 0xabc... and 0xdef... related — do they share counterparties or tokens?"
    expected_commands: ["vike wallet compare"]
    forbidden: ["vike compare", "vike wallet diff"]
    skill: vike-wallet-compare

  - id: wallet-batch
    q: "Enrich this list of 50 addresses with labels and 30-day flow summary."
    expected_commands: ["vike wallet batch"]
    forbidden: ["vike batch", "--csv"]
    skill: vike-wallet-batch

  - id: wallet-labels
    q: "Multi-source label cascade for 0x28C6c06298d514Db089934071355E5743bf21d60."
    expected_commands: ["vike labels"]
    forbidden: ["vike wallet labels", "--source"]
    skill: vike-wallet-label-provenance

  - id: wallet-ens
    q: "Reverse-ENS lookup for 0xd8da6bf26964af9d7eed9e03e53415d37aa96045."
    expected_commands: ["vike wallet ens"]
    forbidden: ["vike ens"]
    skill: vike-wallet-ens

  - id: fund-holdings
    q: "Top fund and market-maker wallets accumulating last 30 days."
    expected_commands: ["vike funds"]
    expected_flags: ["--kind", "--window"]
    forbidden: ["--type", "vike fund"]
    skill: vike-fund-holdings

  - id: wallet-pnl-history
    q: "Daily PnL series for wallet 0xabc... over the last 60 days."
    expected_commands: ["vike wallet pnl-history"]
    expected_flags: ["--days"]
    forbidden: ["--period"]
    skill: vike-wallet-pnl-history

  # ─── Single-step: prediction markets, options, alerts, web ────────────
  - id: pm-markets
    q: "Trending Polymarket crypto markets, top 10."
    expected_commands: ["vike polymarket markets", "vike pm markets"]
    expected_flags: ["--category", "--limit"]
    forbidden: ["vike pm crypto"]
    skill: vike-polymarket-markets

  - id: pm-smart-money-mispricings
    q: "Detect Polymarket smart-money mispricings in the last 24h."
    expected_commands: ["vike polymarket smart-money", "vike pm smart-money"]
    expected_flags: ["--mode", "--hours"]
    forbidden: ["--mispricings"]
    skill: vike-polymarket-smart-money

  - id: options-flow
    q: "What's the put-call ratio on BTC options today?"
    expected_commands: ["vike options flow"]
    expected_flags: ["--symbol"]
    forbidden: ["vike option", "--pcr"]
    skill: vike-options-flow

  - id: alerts-register-webhook
    q: "Register a webhook for alert delivery at https://my.app/hook with secret abc12345abc12345."
    expected_commands: ["vike alerts register-webhook"]
    expected_flags: ["--secret"]
    forbidden: ["--url", "--hmac"]
    skill: vike-alerts-webhook

  - id: web-search
    q: "Search the web for Hyperliquid funding rate news."
    expected_commands: ["vike web search"]
    forbidden: ["vike search web"]
    skill: vike-web-search

  # ─── Multi-step composites — these exercise PLAYBOOK skills ────────────
  - id: composite-smart-money-on-token
    q: "I want to know if smart money is currently accumulating PEPE — search for the token, find its top buyers in the last 7 days, and profile any wallet that looks like a real trader (not an exchange)."
    expected_commands:
      - "vike token search"
      - "vike token transfers"
      - "vike wallet summary"
    expected_flags: ["--tab", "--period", "--chain"]
    forbidden: ["--smart-money", "vike smartmoney"]
    skill: vike-smart-money-discovery
    multi_step: true

  - id: composite-wallet-portfolio
    q: "Give me a full snapshot of 0xd8da6bf26964af9d7eed9e03e53415d37aa96045 — ENS, labels, ERC-20 balances, DeFi positions, recent net flow."
    expected_commands:
      - "vike wallet ens"
      - "vike labels"
      - "vike wallet balances"
      - "vike defi"
      - "vike wallet pnl-history"
    forbidden: ["vike profile", "vike snapshot"]
    skill: vike-wallet-portfolio
    multi_step: true

  - id: composite-polymarket-overview
    q: "Give me a Polymarket market overview — trending markets, top smart-money inflows, and current mispricings."
    expected_commands:
      - "vike polymarket markets"
      - "vike polymarket smart-money"
    expected_flags: ["--mode"]
    forbidden: ["vike pm overview", "vike pm screener"]
    skill: vike-polymarket-screener
    multi_step: true

  - id: composite-perp-market-snapshot
    q: "Give me a perp-market snapshot — funding arbs, cross-venue spreads, and the top HL traders by PnL today."
    expected_commands:
      - "vike perp funding"
      - "vike perp spreads"
      - "vike perp top-traders"
    expected_flags: ["--window"]
    forbidden: ["vike perp screener", "vike perp summary"]
    skill: vike-perp-screener
    multi_step: true

  - id: composite-token-research
    q: "Research $TOKEN — resolve its address, see top buyers + sellers in the last 24h, and pull the price chart."
    expected_commands:
      - "vike token search"
      - "vike token transfers"
      - "vike token chart"
    expected_flags: ["--tab", "--period"]
    forbidden: ["vike token research", "vike research"]
    skill: vike-token-research
    multi_step: true

  - id: composite-hl-trader-profile
    q: "Profile HL trader 0xabc... — leaderboard rank by PnL + win rate + drawdown, plus their spot activity."
    expected_commands:
      - "vike perp top-traders"
      - "vike wallet summary"
    expected_flags: ["--sort", "--window"]
    forbidden: ["vike hl profile", "vike perp profile"]
    skill: vike-hl-trader-profile
    multi_step: true

  - id: composite-cross-venue-perp
    q: "Compare BTC perp across all venues — funding rates and cross-venue spreads."
    expected_commands:
      - "vike perp funding"
      - "vike perp spreads"
    expected_flags: ["--symbol"]
    forbidden: ["vike cross-venue", "vike perp compare"]
    skill: vike-cross-venue-perps
    multi_step: true

  - id: composite-web-research
    q: "Find recent articles about Hyperliquid funding mechanics and summarize the top result."
    expected_commands:
      - "vike web search"
      - "vike web fetch"
    expected_flags: ["--ask"]
    forbidden: ["vike search-and-fetch", "vike research"]
    skill: vike-web-research
    multi_step: true

  - id: composite-wallet-investigation
    q: "Investigate 0xabc... — check its labels, see who it trades with most, and trace 2 hops outward to surface related wallets."
    expected_commands:
      - "vike labels"
      - "vike wallet counterparties"
      - "vike wallet trace"
    expected_flags: ["--depth"]
    forbidden: ["vike investigate", "vike wallet investigate"]
    skill: vike-wallet-trace
    multi_step: true

  - id: composite-alerts-setup
    q: "Set up an alert for big USDC transfers over $1M on ethereum, delivered via email — first check my available channels."
    expected_commands:
      - "vike alerts channels"
      - "vike alerts create"
    expected_flags: ["--label", "--token", "--chain", "--min-usd", "--channel"]
    forbidden: ["vike alert", "--type"]
    skill: vike-alerts-setup
    multi_step: true

  # ─── Ambiguous questions (no pre-specified steps) — test skill guidance ─
  - id: ambig-suspicious-transfer
    q: "I just saw a $50M USDC transfer to a wallet created yesterday. Should I worry?"
    expected_commands:
      - "vike labels"
      - "vike wallet trace"
    expected_flags: ["--depth"]
    forbidden: ["vike alert", "vike worry"]
    skill: vike-wallet-trace
    multi_step: true

  - id: ambig-dormant-wallet-wakes
    q: "This wallet hasn't moved in 2 years and just transferred 100k ETH out. What should I look at?"
    expected_commands:
      - "vike wallet summary"
      - "vike wallet transactions"
      - "vike labels"
    expected_flags: ["--direction", "--days"]
    forbidden: ["vike monitor"]
    skill: vike-wallet-transactions
    multi_step: true

  - id: ambig-frontrunning-hunt
    q: "Figure out who's been front-running my trades on Hyperliquid recently."
    expected_commands:
      - "vike perp top-traders"
      - "vike wallet counterparties"
    expected_flags: ["--window"]
    forbidden: ["vike frontrun", "vike mempool"]
    skill: vike-hl-trader-profile
    multi_step: true

  - id: ambig-pm-insider-signal
    q: "Find me Polymarket markets where insiders are betting heavily against the consensus right now."
    expected_commands:
      - "vike polymarket smart-money"
    expected_flags: ["--mode"]
    forbidden: ["vike pm insiders", "vike polymarket insiders"]
    skill: vike-polymarket-smart-money
    multi_step: false

  - id: ambig-cross-asset-rotation
    q: "I want to see when smart money rotated from ETH into SOL over the last 30 days."
    expected_commands:
      - "vike token transfers"
      - "vike token holders"
    expected_flags: ["--chain", "--period"]
    forbidden: ["vike rotation"]
    skill: vike-token-research
    multi_step: true

  # ─── Trap questions — test anti-pattern avoidance ────────────────────
  # Each trap has a "naive" answer (A likely picks) and a "skill-guided"
  # answer (B picks because the skill warns about the pitfall).

  - id: trap-cex-overlap-relatedness
    q: "Are 0xabc... and 0xdef... controlled by the same person? They both deposit to Binance hot wallet 14."
    expected_commands:
      - "vike wallet compare"
      - "vike labels"     # ← the skill says: label shared CPs before claiming relatedness
    forbidden: ["vike wallet confirm-related", "vike check-ownership"]
    skill: vike-wallet-compare
    multi_step: true

  - id: trap-pnl-history-as-pnl
    q: "Get me the lifetime PnL of wallet 0xabc."
    expected_commands:
      - "vike wallet discover"        # ← right tool: --sort pnl --window all
      - "vike wallet summary"          # ← OK alternative
    expected_flags: ["--sort"]
    forbidden: ["pnl-history --days all"]   # pnl-history is daily net flow, NOT realized PnL
    skill: vike-wallet-pnl-history
    multi_step: false

  - id: trap-small-sample-winrate
    q: "Show me Hyperliquid traders with 90%+ win rate so I can copy-trade them."
    expected_commands:
      - "vike perp top-traders"
    expected_flags: ["--min-win-rate", "--min-trades"]   # ← skill warns: filter min-trades to avoid noise
    forbidden: ["--size 100"]
    skill: vike-hl-top-traders
    multi_step: false

  - id: trap-holders-vs-buyers
    q: "Top 20 wallets accumulating PEPE right now."
    expected_commands:
      - "vike token transfers"   # ← recent BUYERS via --tab bought (skill emphasizes this)
      - "vike token holders"     # ← acceptable alt (lifetime net inflow)
    expected_flags: ["--tab", "--period"]
    forbidden: ["--accumulators", "vike token accumulating"]
    skill: vike-token-transfers
    multi_step: false

  - id: trap-defi-for-token-balances
    q: "Get current ERC-20 token balances for 0xabc — what does the wallet hold right now?"
    expected_commands:
      - "vike wallet balances"   # ← the right tool
    forbidden: ["vike defi"]      # ← defi gives PROTOCOL positions, not spot ERC-20 balances
    skill: vike-wallet-balances
    multi_step: false

  # ─── Single-step: ohlcv (CEX historical candles / data download) ─────
  - id: ohlcv-historical-candles
    q: "Pull the last week of hourly BTC candles from Binance for a backtest."
    expected_commands: ["vike ohlcv"]
    expected_flags: ["--interval", "--exchange"]
    forbidden: ["vike token chart", "vike chart", "--symbol"]   # symbol is positional, not a flag
    skill: vike-ohlcv
    multi_step: false

  - id: ohlcv-perp-candles
    q: "Give me 4-hour ETH perpetual candles, the most recent 200 bars."
    expected_commands: ["vike ohlcv"]
    expected_flags: ["--interval", "--market", "--limit"]
    forbidden: ["vike perp ohlcv", "vike perp chart", "--symbol"]
    skill: vike-ohlcv
    multi_step: false

  - id: trap-ohlcv-vs-token-chart
    q: "Get the price candles for the token at 0x6982508145454ce325ddbe47a25d4ec3d2311933."
    expected_commands:
      - "vike token chart"        # ← DEX candles by contract address
    expected_flags: ["--interval"]
    forbidden: ["vike ohlcv"]     # ← ohlcv is by ticker/pair (BTC, BTCUSDT), not a contract address
    skill: vike-token-research
    multi_step: false
