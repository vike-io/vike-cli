version: 2
updates:
  # npm dependencies — weekly bumps, grouped by type to keep PR noise down
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    groups:
      dev-deps:
        dependency-type: development
        update-types: [patch, minor]
      runtime-deps:
        dependency-type: production
        update-types: [patch]
    commit-message:
      prefix: chore
      include: scope
    labels: [dependencies]

  # GitHub Actions — bumps for actions/checkout, setup-node, etc.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    commit-message:
      prefix: ci
      include: scope
    labels: [dependencies, ci]
